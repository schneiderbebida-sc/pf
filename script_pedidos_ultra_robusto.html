
<style>
/* Estilos para o Modal de Cadastro */
#modal-cadastro {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
}
.modal-content {
    background-color: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.5);
}
.modal-content h2 { margin-top: 0; color: #3d4f45; font-size: 1.4rem; margin-bottom: 20px; }
.modal-content label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; text-align: left; }
.modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
.modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
.btn-confirmar { background: #3d4f45; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
.btn-cancelar { background: #ccc; color: #333; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }

/* Botões Flutuantes */
#btn-relatorio, #btn-limpar {
    position: fixed;
    bottom: 30px;
    padding: 15px 25px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 1.1rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 9000;
    display: none;
    font-weight: bold;
    border: none;
    color: white;
}
#btn-relatorio { right: 30px; background: #3d4f45; }
#btn-limpar { right: 280px; background: #c0392b; }

@media (max-width: 768px) {
    #btn-relatorio { right: 10px; bottom: 10px; padding: 12px 15px; font-size: 0.9rem; }
    #btn-limpar { right: auto; left: 10px; bottom: 10px; padding: 12px 15px; font-size: 0.9rem; }
}

/* Controles nos Cards */
.controles-pedido {
    display: flex !important;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid #eee;
    visibility: visible !important;
    opacity: 1 !important;
}
.btn-qtd {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
}
.btn-qtd:active { transform: scale(0.9); }
.btn-menos { border: 1px solid #3d4f45; background: white; color: #3d4f45; }
.btn-mais { border: none; background: #3d4f45; color: white; }
.input-qtd {
    width: 55px;
    text-align: center;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-weight: bold;
    background: #fff;
    padding: 5px;
    font-size: 1rem;
}
</style>

<!-- Estrutura do Modal -->
<div id="modal-cadastro">
    <div class="modal-content">
        <h2>Identificação do Pedido</h2>
        <label for="is-empresa">Empresa?</label>
        <select id="is-empresa" onchange="window.toggleCNPJ(this.value)">
            <option value="nao">Não</option>
            <option value="sim">Sim</option>
        </select>
        <label for="nome-cliente" id="label-nome">Nome Completo:</label>
        <input type="text" id="nome-cliente" placeholder="Digite seu nome">
        <div id="campo-cnpj" style="display: none;">
            <label for="cnpj-cliente">CNPJ (Obrigatório):</label>
            <input type="text" id="cnpj-cliente" placeholder="00.000.000/0000-00">
        </div>
        <label for="email-cliente">E-mail:</label>
        <input type="email" id="email-cliente" placeholder="seu@email.com">
        <label for="tel-cliente">Telefone:</label>
        <input type="tel" id="tel-cliente" placeholder="(00) 00000-0000">
        <div class="modal-buttons">
            <button class="btn-cancelar" onclick="window.fecharModal()">Cancelar</button>
            <button class="btn-confirmar" onclick="window.confirmarPedido()">Gerar Relatório</button>
        </div>
    </div>
</div>

<script>
(function() {
    let pedido = JSON.parse(localStorage.getItem('pedido_schneider')) || {};

    window.toggleCNPJ = function(valor) {
        const campoCnpj = document.getElementById('campo-cnpj');
        const labelNome = document.getElementById('label-nome');
        if (valor === 'sim') {
            campoCnpj.style.display = 'block';
            labelNome.innerText = 'Nome da Empresa:';
        } else {
            campoCnpj.style.display = 'none';
            labelNome.innerText = 'Nome Completo:';
        }
    };

    window.atualizarContador = function() {
        const totalItens = Object.values(pedido).reduce((acc, curr) => acc + curr.qtd, 0);
        const btnRelatorio = document.getElementById('btn-relatorio');
        const btnLimpar = document.getElementById('btn-limpar');
        if (btnRelatorio) {
            btnRelatorio.innerHTML = `📋 Gerar Relatório (${totalItens})`;
            btnRelatorio.style.display = totalItens > 0 ? 'block' : 'none';
        }
        if (btnLimpar) {
            btnLimpar.style.display = totalItens > 0 ? 'block' : 'none';
        }
        localStorage.setItem('pedido_schneider', JSON.stringify(pedido));
    };

    window.alterarQuantidade = function(id, nome, preco, delta) {
        if (!pedido[id]) pedido[id] = { nome, preco, qtd: 0 };
        pedido[id].qtd += delta;
        if (pedido[id].qtd <= 0) delete pedido[id];
        const input = document.getElementById(`qtd-${id}`);
        if (input) input.value = pedido[id] ? pedido[id].qtd : 0;
        window.atualizarContador();
    };

    window.digitarQuantidade = function(id, nome, preco, valor) {
        const qtd = parseInt(valor) || 0;
        if (qtd <= 0) delete pedido[id];
        else pedido[id] = { nome, preco, qtd: qtd };
        const input = document.getElementById(`qtd-${id}`);
        if (input) input.value = qtd > 0 ? qtd : 0;
        window.atualizarContador();
    };

    window.limparPedido = function() {
        if (confirm("Deseja realmente limpar todo o seu pedido e recomeçar?")) {
            pedido = {};
            document.querySelectorAll('.input-qtd').forEach(input => input.value = 0);
            window.atualizarContador();
        }
    };

    window.abrirModal = function() { document.getElementById('modal-cadastro').style.display = 'flex'; };
    window.fecharModal = function() { document.getElementById('modal-cadastro').style.display = 'none'; };

    window.confirmarPedido = function() {
        const isEmpresa = document.getElementById('is-empresa').value;
        const nome = document.getElementById('nome-cliente').value;
        const cnpj = document.getElementById('cnpj-cliente').value;
        const email = document.getElementById('email-cliente').value;
        const tel = document.getElementById('tel-cliente').value;
        if (!nome) { alert("Por favor, preencha o nome."); return; }
        if (isEmpresa === 'sim' && !cnpj) { alert("Para empresas, o preenchimento do CNPJ é obrigatório."); return; }
        window.fecharModal();
        window.gerarRelatorio(nome, email, tel, isEmpresa === 'sim' ? cnpj : null);
    };

    window.gerarRelatorio = function(nomeCli, emailCli, telCli, cnpjCli) {
        const itens = Object.values(pedido);
        if (itens.length === 0) return;
        const dataAtual = new Date().toLocaleDateString('pt-BR');
        let totalGeral = 0;
        let csvData = "RELATORIO DE PEDIDO - SCHNEIDER BEBIDAS\\nData:;${dataAtual}\\nCliente:;${nomeCli}\\n";
        if (cnpjCli) csvData += "CNPJ:;${cnpjCli}\\n";
        csvData += "E-mail:;${emailCli || '-'}\\nTelefone:;${telCli || '-'}\\n\\nProduto;Quantidade;Preco Unitario;Subtotal\\n";
        let tabelaHtml = "";
        itens.forEach(item => {
            const precoLimpo = item.preco.replace('R$', '').replace(/\\./g, '').replace(',', '.').trim();
            const precoNum = parseFloat(precoLimpo) || 0;
            const subtotal = precoNum * item.qtd;
            totalGeral += subtotal;
            tabelaHtml += `<tr><td>${item.nome}</td><td>${item.qtd}</td><td>${item.preco}</td><td>R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>`;
            csvData += `${item.nome};${item.qtd};${item.preco};R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\\n`;
        });
        csvData += "\\n;TOTAL GERAL:;;R$ " + totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        const win = window.open('', '_blank');
        win.document.write(`<html><head><title>Relatório</title><style>body{font-family:Arial;padding:40px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:10px}th{background:#3d4f45;color:#fff}.total{text-align:right;font-weight:bold;margin-top:20px}@media print{.no-print{display:none}}</style></head><body><div class="no-print"><button onclick="window.print()">Imprimir</button><button onclick="baixarCSV()">CSV</button></div><h1>PEDIDO</h1><p>Cliente: ${nomeCli}</p>${cnpjCli ? `<p>CNPJ: ${cnpjCli}</p>` : ''}<table><thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th></tr></thead><tbody>${tabelaHtml}</tbody></table><div class="total">Total: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><script>function baixarCSV(){const blob=new Blob(["\\ufeff"+"${csvData}"],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="pedido.csv";a.click()}<\/script></body></html>`);
        win.document.close();
    };

    function inicializar() {
        const cards = document.querySelectorAll('.card');
        if (cards.length === 0) return setTimeout(inicializar, 500);
        
        cards.forEach((card, index) => {
            if (card.querySelector('.controles-pedido')) return;
            const body = card.querySelector('.card-body');
            const h3 = card.querySelector('h3');
            const precoSpan = card.querySelector('.preco');
            if (!body || !h3 || !precoSpan) return;
            const id = 'prod-' + index;
            const nome = h3.innerText.replace(/'/g, "\\'");
            const preco = precoSpan.innerText;
            const div = document.createElement('div');
            div.className = 'controles-pedido';
            div.innerHTML = `
                <button class="btn-qtd btn-menos" onclick="window.alterarQuantidade('${id}', '${nome}', '${preco}', -1)">-</button>
                <input type="number" id="qtd-${id}" class="input-qtd" value="${pedido[id] ? pedido[id].qtd : 0}" onchange="window.digitarQuantidade('${id}', '${nome}', '${preco}', this.value)">
                <button class="btn-qtd btn-mais" onclick="window.alterarQuantidade('${id}', '${nome}', '${preco}', 1)">+</button>
            `;
            body.appendChild(div);
        });

        if (!document.getElementById('btn-relatorio')) {
            const b1 = document.createElement('button'); b1.id = 'btn-relatorio'; b1.onclick = window.abrirModal; document.body.appendChild(b1);
            const b2 = document.createElement('button'); b2.id = 'btn-limpar'; b2.innerHTML = '🗑️ Limpar'; b2.onclick = window.limparPedido; document.body.appendChild(b2);
        }
        window.atualizarContador();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', inicializar);
    else inicializar();
    setTimeout(inicializar, 2000); // Garantia extra
})();
</script>
</body></html>
