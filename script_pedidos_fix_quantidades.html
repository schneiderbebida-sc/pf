
<style>
/* Estilos para o Modal de Cadastro */
#modal-cadastro {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    padding: 10px;
}
.modal-content {
    background-color: #fff;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.5);
    max-height: 90vh;
    overflow-y: auto;
}
.modal-content h2 { margin-top: 0; color: #3d4f45; font-size: 1.3rem; margin-bottom: 15px; text-align: center; }
.modal-content label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; text-align: left; font-size: 0.9rem; }
.modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; -webkit-appearance: none; }
.modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
.btn-confirmar { background: #3d4f45; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
.btn-cancelar { background: #ccc; color: #333; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }

/* Botões Flutuantes */
#btn-relatorio, #btn-limpar {
    position: fixed;
    bottom: 20px;
    padding: 12px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 9000;
    display: none;
    font-weight: bold;
    border: none;
    color: white;
    touch-action: manipulation;
}
#btn-relatorio { right: 20px; background: #3d4f45; }
#btn-limpar { left: 20px; background: #c0392b; }

@media (max-width: 768px) {
    #btn-relatorio { right: 10px; bottom: 10px; padding: 12px 15px; font-size: 0.9rem; }
    #btn-limpar { right: auto; left: 10px; bottom: 10px; padding: 12px 15px; font-size: 0.9rem; }
}

/* Controles nos Cards */
.controles-pedido {
    display: flex !important;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px solid #eee;
}
.btn-qtd {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    user-select: none;
}
.btn-menos { border: 1px solid #3d4f45; background: white; color: #3d4f45; }
.btn-mais { border: none; background: #3d4f45; color: white; }
.input-qtd {
    width: 50px;
    text-align: center;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-weight: bold;
    background: #fff;
    padding: 6px;
    font-size: 1rem;
}

/* Overlay do Relatório (para Mobile) */
#relatorio-overlay {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow-y: auto;
    padding: 20px;
}
.relatorio-header-mobile {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #3d4f45;
}
.btn-rel-mobile {
    padding: 12px 15px;
    border-radius: 8px;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
    flex: 1;
    text-align: center;
}
.btn-whatsapp { background: #25D366; color: white; width: 100%; margin-bottom: 10px; font-size: 1.1rem; }

/* Estilos de Impressão - CORREÇÃO DEFINITIVA */
@media print {
    /* Esconde TUDO da página original */
    body > *:not(#relatorio-overlay) {
        display: none !important;
    }
    
    /* Garante que o overlay e seu conteúdo sejam visíveis */
    #relatorio-overlay {
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        padding: 0 !important;
        margin: 0 !important;
    }
    
    /* Esconde os botões de controle do relatório na impressão */
    .no-print, .relatorio-header-mobile {
        display: none !important;
    }
    
    /* Formatação do conteúdo do relatório para papel */
    #relatorio-conteudo {
        display: block !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
    }
    
    /* Evita quebras de página no meio de itens */
    tr { page-break-inside: avoid; }
}
</style>

<!-- Estrutura do Modal -->
<div id="modal-cadastro">
    <div class="modal-content">
        <h2>Identificação da Empresa</h2>
        <label for="nome-cliente" id="label-nome">Nome da Empresa:</label>
        <input type="text" id="nome-cliente" placeholder="Digite o nome da empresa">
        <div id="campo-cnpj">
            <label for="cnpj-cliente">CNPJ (Obrigatório):</label>
            <input type="text" id="cnpj-cliente" placeholder="00.000.000/0000-00">
        </div>
        <label for="email-cliente">E-mail:</label>
        <input type="email" id="email-cliente" placeholder="seu@email.com">
        <label for="tel-cliente">Telefone:</label>
        <input type="tel" id="tel-cliente" placeholder="(00) 00000-0000">
        <div class="modal-buttons">
            <button class="btn-cancelar" onclick="window.fecharModal()">Cancelar</button>
            <button class="btn-confirmar" onclick="window.confirmarPedido()">Gerar Relatório</button>
        </div>
    </div>
</div>

<!-- Overlay do Relatório -->
<div id="relatorio-overlay">
    <div class="relatorio-header-mobile no-print">
        <button onclick="window.enviarWhatsApp()" class="btn-rel-mobile btn-whatsapp">✅ Enviar Pedido via WhatsApp</button>
        <div style="display: flex; gap: 10px;">
            <button onclick="document.getElementById(\'relatorio-overlay\').style.display=\'none\'" style="background:#666;" class="btn-rel-mobile">Voltar</button>
            <button onclick="window.print()" style="background:#3d4f45;" class="btn-rel-mobile">Imprimir</button>
            <button onclick="window.baixarCSV()" style="background:#27ae60;" class="btn-rel-mobile">CSV</button>
        </div>
    </div>
    <div id="relatorio-conteudo"></div>
</div>

<script>
(function() {
    let pedido = JSON.parse(localStorage.getItem(\'pedido_schneider\')) || {};
    let dadosCliente = JSON.parse(localStorage.getItem(\'dados_cliente_schneider_pj\')) || {}; // Chave diferente para PJ

    // Função de validação de CNPJ
    function validarCNPJ(cnpj) {
        cnpj = cnpj.replace(/[.\/-]/g, \'\');
        if (cnpj == \'\') return false;
        if (cnpj.length != 14) return false;
        if (/^(\\d)\\1{13}$/.test(cnpj)) return false;

        let tamanho = cnpj.length - 2;
        let numeros = cnpj.substring(0, tamanho);
        let digitos = cnpj.substring(tamanho);
        let soma = 0;
        let pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        if (resultado != digitos.charAt(0)) return false;

        tamanho = tamanho + 1;
        numeros = cnpj.substring(0, tamanho);
        soma = 0;
        pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        if (resultado != digitos.charAt(1)) return false;

        return true;
    }

    window.atualizarContador = function() {
        const totalItens = Object.values(pedido).reduce((acc, curr) => acc + curr.qtd, 0);
        const btnRelatorio = document.getElementById(\'btn-relatorio\');
        const btnLimpar = document.getElementById(\'btn-limpar\');
        if (btnRelatorio) {
            btnRelatorio.innerHTML = `📋 Relatório (${totalItens})`;
            btnRelatorio.style.display = totalItens > 0 ? \'block\' : \'none\';
        }
        if (btnLimpar) {
            btnLimpar.style.display = totalItens > 0 ? \'block\' : \'none\';
        }
        localStorage.setItem(\'pedido_schneider\', JSON.stringify(pedido));
    };

    window.alterarQuantidade = function(id, nome, preco, delta) {
        if (!pedido[id]) pedido[id] = { nome, preco, qtd: 0 };
        pedido[id].qtd += delta;
        if (pedido[id].qtd <= 0) delete pedido[id];
        const input = document.getElementById(`qtd-${id}`);
        if (input) input.value = pedido[id] ? pedido[id].qtd : 0;
        window.atualizarContador();
    };

    window.digitarQuantidade = function(id, nome, preco, valor) {
        const qtd = parseInt(valor) || 0;
        if (qtd <= 0) delete pedido[id];
        else pedido[id] = { nome, preco, qtd: qtd };
        const input = document.getElementById(`qtd-${id}`);
        if (input) input.value = qtd > 0 ? qtd : 0;
        window.atualizarContador();
    };

    window.limparPedido = function() {
        if (confirm("Deseja realmente limpar todo o seu pedido e recomeçar?")) {
            pedido = {};
            document.querySelectorAll(\".input-qtd\").forEach(input => input.value = 0);
            window.atualizarContador();
        }
    };

    window.abrirModal = function() { 
        // Preencher campos com dados salvos se existirem
        if (dadosCliente.nome) document.getElementById(\'nome-cliente\').value = dadosCliente.nome;
        if (dadosCliente.email) document.getElementById(\'email-cliente\').value = dadosCliente.email;
        if (dadosCliente.tel) document.getElementById(\'tel-cliente\').value = dadosCliente.tel;
        if (dadosCliente.cnpj) {
            document.getElementById(\'cnpj-cliente\').value = dadosCliente.cnpj;
        }
        document.getElementById(\'modal-cadastro\').style.display = \'flex\'; 
    };
    
    window.fecharModal = function() { document.getElementById(\'modal-cadastro\').style.display = \'none\'; };

    window.confirmarPedido = function() {
        const nome = document.getElementById(\'nome-cliente\').value;
        const cnpj = document.getElementById(\'cnpj-cliente\').value;
        const email = document.getElementById(\'email-cliente\').value;
        const tel = document.getElementById(\'tel-cliente\').value;

        if (!nome) { alert("Por favor, preencha o Nome da Empresa."); return; }
        if (!cnpj) { alert("Por favor, preencha o CNPJ."); return; }
        if (!validarCNPJ(cnpj)) { alert("CNPJ inválido. Por favor, verifique."); return; }
        if (!email) { alert("Por favor, preencha o E-mail."); return; }
        if (!tel) { alert("Por favor, preencha o Telefone."); return; }
        
        // Salvar dados para a próxima vez
        dadosCliente = { nome, email, tel, cnpj, data: new Date().toLocaleDateString(\'pt-BR\') };
        localStorage.setItem(\'dados_cliente_schneider_pj\', JSON.stringify(dadosCliente)); // Chave diferente para PJ
        
        window.fecharModal();
        window.gerarRelatorio();
    };

    window.gerarRelatorio = function() {
        const itens = Object.values(pedido);
        if (itens.length === 0) return;
        let totalGeral = 0;
        let tabelaHtml = "";
        
        itens.forEach(item => {
            const precoLimpo = item.preco.replace(\'R$\' , \'\').replace(/\\./g, \'\').replace(\'\', \'.\').trim();
            const precoNum = parseFloat(precoLimpo) || 0;
            const subtotal = precoNum * item.qtd;
            totalGeral += subtotal;
            tabelaHtml += `<tr><td style="border:1px solid #ddd; padding:8px;">${item.nome}</td><td style="border:1px solid #ddd; padding:8px; text-align:center;">${item.qtd}</td><td style="border:1px solid #ddd; padding:8px;">${item.preco}</td><td style="border:1px solid #ddd; padding:8px;">R$ ${subtotal.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2})}</td></tr>`;
        });

        const relatorioHtml = `
            <div style="font-family:Arial; color:#333; max-width:800px; margin:0 auto;">
                <div style="text-align:center; border-bottom:2px solid #3d4f45; padding-bottom:15px; margin-bottom:20px;">
                    <h1 style="margin:0; color:#3d4f45; font-size:1.5rem;">RELATÓRIO DE PEDIDO (PJ)</h1>
                    <p style="margin:5px 0;">Schneider Bebidas | Data: ${dadosCliente.data}</p>
                </div>
                <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px; border-left:5px solid #3d4f45;">
                    <p><strong>Empresa:</strong> ${dadosCliente.nome}</p>
                    <p><strong>CNPJ:</strong> ${dadosCliente.cnpj}</p>
                    <p><strong>E-mail:</strong> ${dadosCliente.email}</p>
                    <p><strong>Telefone:</strong> ${dadosCliente.tel}</p>
                </div>
                <table style="width:100%; border-collapse:collapse; margin-bottom:20px; font-size:0.9rem;">
                    <thead><tr style="background:#3d4f45; color:#fff;">
                        <th style="border:1px solid #ddd; padding:8px; text-align:left;">Produto</th>
                        <th style="border:1px solid #ddd; padding:8px; text-align:center;">Qtd</th>
                        <th style="border:1px solid #ddd; padding:8px; text-align:left;">Preço</th>
                        <th style="border:1px solid #ddd; padding:8px; text-align:left;">Subtotal</th>
                    </tr></thead>
                    <tbody>${tabelaHtml}</tbody>
                </table>
                <div style="text-align:right; font-weight:bold; font-size:1.1rem; color:#3d4f45;">Total: R$ ${totalGeral.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2})}</div>
                <div style="margin-top:30px; font-size:0.8rem; color:#666; text-align:center;"><p>Documento gerado para conferência de pedido.</p></div>
            </div>
        `;

        document.getElementById(\'relatorio-conteudo\').innerHTML = relatorioHtml;
        document.getElementById(\'relatorio-overlay\').style.display = \'block\';
    };

    window.enviarWhatsApp = function() {
        const itens = Object.values(pedido);
        let totalGeral = 0;
        let msg = `*PEDIDO (PJ) - SCHNEIDER BEBIDAS*\n\n`;
        msg += `*Data:* ${dadosCliente.data}\n`;
        msg += `*Empresa:* ${dadosCliente.nome}\n`;
        msg += `*CNPJ:* ${dadosCliente.cnpj}\n`;
        if (dadosCliente.tel) msg += `*Telefone:* ${dadosCliente.tel}\n\n`;
        msg += `*ITENS DO PEDIDO:*\n`;
        
        itens.forEach(item => {
            const precoLimpo = item.preco.replace(\'R$\' , \'\').replace(/\\./g, \'\').replace(\'\', \'.\').trim();
            const precoNum = parseFloat(precoLimpo) || 0;
            const subtotal = precoNum * item.qtd;
            totalGeral += subtotal;
            msg += `• ${item.qtd}x ${item.nome} - ${item.preco} (Subtotal: R$ ${subtotal.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2})})\n`;
        });
        
        msg += `\n*TOTAL ESTIMADO: R$ ${totalGeral.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2})}*`;
        
        const foneLoja = "5547933860900";
        const url = `https://api.whatsapp.com/send?phone=${foneLoja}&text=${encodeURIComponent(msg)}`;
        window.open(url, \'_blank\');
    };

    window.baixarCSV = function() {
        const itens = Object.values(pedido);
        let totalGeral = 0;
        let csv = "DADOS DO CLIENTE\nData;Nome da Empresa;CNPJ;E-mail;Telefone\n";
        csv += `${dadosCliente.data};${dadosCliente.nome};${dadosCliente.cnpj};${dadosCliente.email || \'-\'};${dadosCliente.tel || \'-\'}\n\nITENS DO PEDIDO\nProduto;Quantidade;Preco Unitario;Subtotal\n`;
        
        itens.forEach(item => {
            const precoLimpo = item.preco.replace(\'R$\' , \'\').replace(/\\./g, \'\').replace(\'\', \'.\').trim();
            const precoNum = parseFloat(precoLimpo) || 0;
            const subtotal = precoNum * item.qtd;
            totalGeral += subtotal;
            csv += `${item.nome};${item.qtd};${item.preco};R$ ${subtotal.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2})}\n`;
        });
        csv += "\n;TOTAL GERAL:;;R$ " + totalGeral.toLocaleString(\'pt-BR\', {minimumFractionDigits: 2});
        
        const blob = new Blob(["\\ufeff" + csv], {type: "text/csv;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `pedido_PJ_${dadosCliente.data.replace(/\\//g, \'-\' )}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };

    function inicializar() {
        const cards = document.querySelectorAll(\".card\");
        if (cards.length === 0) return setTimeout(inicializar, 500);
        cards.forEach((card, index) => {
            if (card.querySelector(\".controles-pedido\")) return;
            const body = card.querySelector(\".card-body\");
            const h3 = card.querySelector(\'h3\');
            const precoSpan = card.querySelector(\".preco\");
            if (!body || !h3 || !precoSpan) return;
            const id = \'prod-\' + index;
            const nome = h3.innerText.replace(/\'/g, "\\'");
            const preco = precoSpan.innerText;
            const div = document.createElement(\'div\');
            div.className = \'controles-pedido\';
            div.innerHTML = `
                <button class="btn-qtd btn-menos" onclick="window.alterarQuantidade(\'${id}\', \'${nome}\', \'${preco}\', -1)">-</button>
                <input type="number" id="qtd-${id}" class="input-qtd" value="${pedido[id] ? pedido[id].qtd : 0}" onchange="window.digitarQuantidade(\'${id}\', \'${nome}\', \'${preco}\', this.value)">
                <button class="btn-qtd btn-mais" onclick="window.alterarQuantidade(\'${id}\', \'${nome}\', \'${preco}\', 1)">+</button>
            `;
            body.appendChild(div);
        });
        if (!document.getElementById(\'btn-relatorio\')) {
            const b1 = document.createElement(\'button\'); b1.id = \'btn-relatorio\'; b1.onclick = window.abrirModal; document.body.appendChild(b1);
            const b2 = document.createElement(\'button\'); b2.id = \'btn-limpar\'; b2.innerHTML = \'🗑️ Limpar\'; b2.onclick = window.limparPedido; document.body.appendChild(b2);
        }
        window.atualizarContador();
    }
    inicializar();
    setTimeout(inicializar, 2000);
})();
</script>
</body></html>
